<!DOCTYPE html>
<html>
<head>
  <title>LK MindLink</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-black flex items-center justify-center min-h-screen">

  <div class="bg-white rounded-xl shadow-xl w-[350px] p-8 text-center">

    <!-- APP NAME -->
    <div class="mb-6">
      <h1 class="text-xl font-bold text-black">LK MindLink</h1>
    </div>

    <!-- TITLE -->
    <h2 class="text-2xl font-semibold mb-1 text-black">Sign up</h2>
    <p class="text-gray-500 mb-6">Start your journey with LK MindLink</p>

    <!-- INPUTS -->
    <input id="username" placeholder="Username"
      class="w-full mb-3 p-3 border rounded-lg text-black">

    <input id="password" type="password" placeholder="Password"
      class="w-full mb-4 p-3 border rounded-lg text-black">

    <!-- BUTTON -->
    <button id="actionBtn"
      class="w-full bg-blue-600 text-white py-3 rounded-lg mb-4 hover:bg-blue-700">
      Create account
    </button>

    <!-- SWITCH -->
    <p class="mt-4 text-sm text-gray-500">
      Already have an account?
      <span onclick="showLogin()" class="text-blue-600 cursor-pointer">Log in</span>
    </p>

    <!-- RESULT -->

    <p id="result" class="mt-4 text-sm"></p>

  </div>

<script>
const URL = "https://lk-mindlink.onrender.com";

let mode = "register";

// SWITCH TO LOGIN
function showLogin() {
  mode = "login";
  document.querySelector("h2").innerText = "Login";
  document.getElementById("actionBtn").innerText = "Login";
}

// LOGIN FUNCTION
async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  if (!username || !password) {
    document.getElementById("result").innerText = "Fill all fields";
    document.getElementById("result").style.color = "red";
    return;
  }

  const res = await fetch(URL + "/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });

  const result = await res.text();
  document.getElementById("result").innerText = result;

  if (result === "Login successful") {
    document.getElementById("result").style.color = "green";
    localStorage.setItem("user", username);
    window.location.href = "world.html";
  } else {
    document.getElementById("result").style.color = "red";
  }
}

// REGISTER FUNCTION
async function register() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  if (!username || !password) {
    document.getElementById("result").innerText = "Fill all fields";
    document.getElementById("result").style.color = "red";
    return;
  }

  const res = await fetch(URL + "/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });

  const result = await res.text();
  document.getElementById("result").innerText = result;
  document.getElementById("result").style.color = "green";
}

// BUTTON CONTROL
document.getElementById("actionBtn").onclick = () => {
  if (mode === "login") login();
  else register();
};
</script>

</body>
</html>
