  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #000005;
      --card:    #0d0d1a;
      --accent:  #4a7fd4;
      --accent2: #d4507a;
      --text:    #e8e8f0;
      --muted:   #555570;
      --border:  rgba(74,127,212,0.15);
      --error:   #ff4d6d;
      --success: #00ffaa;
    }
    html, body {
      height: 100%;
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }
    .bg { position: fixed; inset: 0; z-index: 0; }
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(74,127,212,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,127,212,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .bg-radial {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(212,80,122,0.10) 0%, transparent 70%);
    }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(100px);
      animation: orbFloat 10s ease-in-out infinite alternate;
    }
    .orb-1 { width: 600px; height: 600px; background: rgba(74,127,212,0.09); top: -200px; left: -200px; }
    .orb-2 { width: 500px; height: 500px; background: rgba(212,80,122,0.09); bottom: -150px; right: -150px; animation-delay: -5s; }
    @keyframes orbFloat {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px,30px) scale(1.1); }
    }
    .scanline {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    }
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      width: 100%; max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px 36px;
      box-shadow: 0 0 0 1px rgba(74,127,212,0.05), 0 0 60px rgba(74,127,212,0.05), 0 40px 80px rgba(0,0,0,0.7);
      animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

/* LOGO */
.logo {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 36px;
}
.logo-img {
  width: 64px; height: 64px;
  object-fit: contain;
  filter: drop-shadow(0 0 12px rgba(74,127,212,0.4));
  animation: logoPulse 3s ease-in-out infinite alternate;
}
@keyframes logoPulse {
  from { filter: drop-shadow(0 0 8px rgba(74,127,212,0.3)); }
  to   { filter: drop-shadow(0 0 20px rgba(212,80,122,0.5)); }
}
.logo-text { display: flex; flex-direction: column; }
.logo-name {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900; font-size: 16px;
  letter-spacing: 1.5px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo-tag {
  font-size: 10px; color: var(--muted);
  letter-spacing: 2px; text-transform: uppercase; margin-top: 3px;
}

.title {
  font-family: 'Orbitron', sans-serif;
  font-size: 22px; font-weight: 700;
  letter-spacing: -0.5px; margin-bottom: 6px;
}
.subtitle {
  font-size: 13px; color: var(--muted);
  margin-bottom: 32px; line-height: 1.5;
}

.field { margin-bottom: 14px; }
.field input {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  padding: 15px 18px;
  font-size: 14px;
  font-family: 'Space Grotesk', sans-serif;
  color: var(--text); outline: none;
  transition: all 0.25s;
}
.field input::placeholder { color: var(--muted); }
.field input:focus {
  border-color: var(--accent);
  background: rgba(74,127,212,0.05);
  box-shadow: 0 0 0 3px rgba(74,127,212,0.10);
}

.btn {
  width: 100%; margin-top: 8px; padding: 15px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: 12px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 13px; letter-spacing: 1px;
  color: #fff; cursor: pointer;
  transition: all 0.2s; margin-bottom: 28px;
  box-shadow: 0 0 30px rgba(74,127,212,0.25);
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(212,80,122,0.35); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.divider {
  display: flex; align-items: center; gap: 10px; margin-bottom: 24px;
}
.divider-line { flex: 1; height: 1px; background: var(--border); }
.divider-text { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

.switch { text-align: center; font-size: 13px; color: var(--muted); }
.switch a { color: var(--accent); cursor: pointer; font-weight: 600; transition: color 0.2s; }
.switch a:hover { color: var(--accent2); }

.result {
  margin-top: 16px; text-align: center;
  font-size: 13px; font-weight: 500;
  min-height: 18px; letter-spacing: 0.3px;
}
.result.error   { color: var(--error); }
.result.success { color: var(--success); }

@media (max-width: 480px) {
  .card { padding: 32px 20px 28px; }
  .title { font-size: 18px; }
  .logo-img { width: 52px; height: 52px; }
}

  </div>

<script>
  const BASE_URL = "https://lk-mindlink.onrender.com";
  let mode = "register";

  function showLogin() {
    mode = "login";
    document.getElementById("title").innerText = "Welcome Back";
    document.getElementById("subtitle").innerText = "Log in to your LK MindLink account.";
    document.getElementById("actionBtn").innerText = "LOG IN";
    document.getElementById("switchText").innerHTML = `Don't have an account? <a onclick="showRegister()">Sign up</a>`;
    clearResult();
  }
  function showRegister() {
    mode = "register";
    document.getElementById("title").innerText = "Create Account";
    document.getElementById("subtitle").innerText = "Join the LK MindLink network today.";
    document.getElementById("actionBtn").innerText = "CREATE ACCOUNT";
    document.getElementById("switchText").innerHTML = `Already have an account? <a onclick="showLogin()">Log in</a>`;
    clearResult();
  }
  function setResult(msg, type) {
    const el = document.getElementById("result");
    el.innerText = msg; el.className = "result " + type;
  }
  function clearResult() {
    const el = document.getElementById("result");
    el.innerText = ""; el.className = "result";
  }
  function setLoading(on, label) {
    const btn = document.getElementById("actionBtn");
    btn.disabled = on;
    btn.innerText = on ? "PLEASE WAIT..." : label;
  }
  async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    if (!username || !password) return setResult("Please fill in all fields.", "error");
    setLoading(true, "LOG IN");
    try {
      const res = await fetch(BASE_URL + "/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });
      const text = await res.text();
      if (res.ok) {
        setResult("✓ Login successful! Redirecting...", "success");
        localStorage.setItem("user", username);
        setTimeout(() => window.location.href = "world.html", 1200);
      } else {
        setResult(text || "Invalid credentials.", "error");
        setLoading(false, "LOG IN");
      }
    } catch (err) {
      setResult("Cannot connect to server. Try again.", "error");
      setLoading(false, "LOG IN");
    }
  }
  async function register() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    if (!username || !password) return setResult("Please fill in all fields.", "error");
    if (password.length < 6) return setResult("Password must be at least 6 characters.", "error");
    setLoading(true, "CREATE ACCOUNT");
    try {
      const res = await fetch(BASE_URL + "/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });
      const text = await res.text();
      if (res.ok) {
        setResult("✓ Account created! Redirecting...", "success");
        localStorage.setItem("user", username);
        setTimeout(() => window.location.href = "world.html", 1200);
      } else {
        setResult(text || "Registration failed.", "error");
        setLoading(false, "CREATE ACCOUNT");
      }
    } catch (err) {
      setResult("Cannot connect to server. Try again.", "error");
      setLoading(false, "CREATE ACCOUNT");
    }
  }
  document.getElementById("actionBtn").onclick = () => {
    if (mode === "login") login(); else register();
  };
  document.addEventListener("keydown", e => {
    if (e.key === "Enter") { if (mode === "login") login(); else register(); }
  });
</script>
