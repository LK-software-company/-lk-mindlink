<!DOCTYPE html>
<html>
<head>
  <title>LK MindLink</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-black flex items-center justify-center min-h-screen">

  <!-- CARD -->
  <div class="bg-white rounded-xl shadow-xl w-[350px] p-8 text-center">

    <!-- NAME ONLY (logo removed) -->
    <div class="mb-6">
      <h1 class="text-xl font-bold text-black">LK MindLink</h1>
    </div>

    <!-- TITLE -->
    <h2 class="text-2xl font-semibold mb-1 text-black">Sign up</h2>
    <p class="text-gray-500 mb-6">Start your journey with LK MindLink</p>

    <!-- INPUTS -->
    <input id="username" placeholder="Username"
      class="w-full mb-3 p-3 border rounded-lg text-black">

    <input id="password" type="password" placeholder="Password"
      class="w-full mb-4 p-3 border rounded-lg text-black">

    <!-- MAIN BUTTON -->
    <button id="actionBtn"
      class="w-full bg-blue-600 text-white py-3 rounded-lg mb-4 hover:bg-blue-700">
      Create account
    </button>

    <!-- DIVIDER -->
    <div class="flex items-center gap-2 my-4">
      <hr class="flex-1">
      <span class="text-gray-400 text-sm">or</span>
      <hr class="flex-1">
    </div>

    <!-- SOCIAL -->
    <button class="w-full border py-2 rounded-lg mb-2 text-black">
      Sign in with Google
    </button>

    <button class="w-full bg-black text-white py-2 rounded-lg">
      Sign in with Apple
    </button>

    <!-- SWITCH -->
    <p class="mt-6 text-sm text-gray-500">
      Already have an account?
      <span onclick="showLogin()" class="text-blue-600 cursor-pointer">Log in</span>
    </p>

    <!-- RESULT -->
    <p id="result" class="mt-4 text-sm text-red-500"></p>

  </div>

<script>
const URL = "https://lk-mindlink.onrender.com";

let mode = "register";

function showLogin() {
  mode = "login";
  document.querySelector("h2").innerText = "Login";
  document.getElementById("actionBtn").innerText = "Login";
}

async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch(URL + "/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });

  const result = await res.text();
  document.getElementById("result").innerText = result;

  if (result === "Login successful") {
    localStorage.setItem("user", username);
    window.location.href = "world.html";
  }
}

async function register() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch(URL + "/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });

  document.getElementById("result").innerText = await res.text();
}

document.getElementById("actionBtn").onclick = () => {
  if (mode === "login") login();
  else register();
};
</script>

</body>
</html>
